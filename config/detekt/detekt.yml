# =============================================================================
# kqChecker Detekt 静态分析配置
# https://detekt.dev/docs/introduction/configurations
# =============================================================================

build:
  maxIssues: 0          # 超过此数量问题则构建失败（CI 阶段可收紧）
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

# =============================================================================
# 处理器
# =============================================================================
processors:
  active: true
  exclude:
    - 'DetektProgressListener'

# =============================================================================
# 报告
# =============================================================================
console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'

# =============================================================================
# 规则集
# =============================================================================

comments:
  active: true
  # 鼓励写注释，但不强制每个公共 API 都必须有 KDoc
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 6
  CyclomaticComplexMethod:
    active: true
    threshold: 70          # 先覆盖历史复杂页面，后续再按模块收紧
  LongMethod:
    active: true
    threshold: 260         # 允许超大屏幕函数暂存，后续拆分
    excludes: ['**/WebLoginActivity.kt']  # WebView 注入脚本天然较长
  LongParameterList:
    active: true
    functionThreshold: 14
    constructorThreshold: 10
    ignoreDefaultParameters: true
  NestedBlockDepth:
    active: true
    threshold: 8
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInObjects: 12
    thresholdInEnums: 8
    ignoreDeprecated: true
    ignorePrivate: false
    ignoreOverridden: true
  NamedArguments:
    active: false          # 不强制使用具名参数

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true
  SleepInsteadOfDelay:
    active: true
  SuspendFunWithCoroutineScopeReceiver:
    active: false

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: '_|ignored|expected'
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true  # 允许重写方法空实现（如 onCreate）
  EmptyClassBlock:
    active: false

exceptions:
  active: true
  ExceptionRaisedInUnexpectedLocation:
    active: true
  NotImplementedDeclaration:
    active: true
  PrintStackTrace:
    active: true
  TooGenericExceptionCaught:
    active: true
    allowedExceptionNameRegex: '_|ignored|expected|t|e'
    exceptionNames:
      - 'Error'
      - 'Exception'    # 鼓励捕获具体异常
    excludes: ['**/WebLoginActivity.kt']  # 该文件有意捕获 Throwable
  TooGenericExceptionThrown:
    active: true
    exceptionNames:
      - 'Error'
      - 'Exception'
      - 'RuntimeException'
  SwallowedException:
    active: true
    allowedExceptionNameRegex: '_|ignored|expected'
    excludes: ['**/WebLoginActivity.kt']

naming:
  active: true
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    ignoreAnnotated:
      - 'Composable'
    excludeClassPattern: '$^'
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'
  MatchingDeclarationName:
    active: true
    mustBeFirst: true
  NoNameShadowing:
    active: true           # 命名遮蔽检测（已手动修复了 startTime 问题）
  ConstructorParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*'

performance:
  active: true
  ArrayPrimitive:
    active: true
  ForEachOnRange:
    active: true
  SpreadOperator:
    active: false          # Android 中 spread 操作符使用较普遍，不报警
  UnnecessaryTemporaryInstantiation:
    active: true

potential-bugs:
  active: true
  AvoidReferentialEquality:
    active: true
  DontDowncastCollectionTypes:
    active: true
  ElseCaseInsteadOfExhaustiveWhen:
    active: false
  ExplicitGarbageCollectionCall:
    active: true
  HasPlatformType:
    active: true
  ImplicitDefaultLocale:
    active: true
  ImplicitUnitReturnType:
    active: false
  LateinitUsage:
    active: false          # Android 中 lateinit 是常规操作
  MapGetWithNotNullAssertionOperator:
    active: true
  NullCheckOnMutableProperty:
    active: false
  NullableToStringCall:
    active: true
  UnconditionalJumpStatementInLoop:
    active: true
  UnsafeCallOnNullableType:
    active: true
  UnsafeCast:
    active: true
  UselessPostfixExpression:
    active: true

style:
  active: true
  CanBeNonNullable:
    active: false
  ClassOrdering:
    active: false
  CollapsibleIfStatements:
    active: true
  DataClassContainsFunctions:
    active: false          # 项目中 data class 包含工厂方法（fromJson）
  DestructuringDeclarationWithTooManyEntries:
    active: true
    maxDestructuringEntries: 4
  EqualsNullCall:
    active: true
  EqualsOnSignatureLine:
    active: false
  ExplicitCollectionElementAccessMethod:
    active: true
  ExplicitItLambdaParameter:
    active: false
  ForbiddenComment:
    active: true
    comments:
      - 'FIXME:'
      - 'STOPSHIP:'
    allowedPatterns: ''
  FunctionOnlyReturningConstant:
    active: true
    ignoreOverridableFunction: true
    ignoreActualFunction: true
    excludedFunctions: []
  MagicNumber:
    active: false
    ignoreNumbers: ['-1', '0', '1', '2', '100', '1000']
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: false
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreEnums: true
    ignoreRanges: false
    ignoreExtensionFunctions: true
  MaxLineLength:
    active: false
    maxLineLength: 160     # 考虑到 JS 注入脚本，设置较宽松的行长度
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: false
  MayBeConst:
    active: true
  ModifierOrder:
    active: true
  MultilineLambdaItParameter:
    active: false
  MultilineRawStringIndentation:
    active: false
  NestedClassesVisibility:
    active: true
  NoTabs:
    active: false
  NullableBooleanCheck:
    active: false
  OptionalAbstractKeyword:
    active: true
  OptionalUnit:
    active: false
  PreferToOverPairSyntax:
    active: false
  RedundantExplicitType:
    active: false
  RedundantHigherOrderMapUsage:
    active: true
  RedundantVisibilityModifierRule:
    active: false
  ReturnCount:
    active: true
    max: 7                 # 兼容历史分支型业务代码，后续逐步收紧
    excludedFunctions: ['equals']
    excludeGuardClauses: true
  SafeCast:
    active: true
  SerialVersionUIDInSerializableClass:
    active: false
  SpacingBetweenPackageAndImports:
    active: false
  ThrowsCount:
    active: true
    max: 3
    excludeGuardClauses: true
  TrailingWhitespace:
    active: false
  TrimMultilineRawString:
    active: false
  UnderscoresInNumericLiterals:
    active: false
  UnnecessaryAbstractClass:
    active: true
  UnnecessaryAnnotationUseSiteTarget:
    active: false
  UnnecessaryApply:
    active: true
  UnnecessaryBackticks:
    active: true
  UnnecessaryBracesAroundTrailingLambda:
    active: false
  UnnecessaryFilter:
    active: true
  UnnecessaryInheritance:
    active: true
  UnnecessaryInnerClass:
    active: false
  UnnecessaryLet:
    active: false
  UnnecessaryParentheses:
    active: false
  UntilInsteadOfRangeTo:
    active: true
  UnusedImports:
    active: false          # 由 ktlint 管理
  UnusedParameter:
    active: true
    allowedNames: 'ignored|expected|_'
  UnusedPrivateMember:
    active: true
    allowedNames: ''
  UseAnyOrNoneInsteadOfFind:
    active: true
  UseArrayLiteralsInAnnotations:
    active: false
  UseCheckNotNull:
    active: true
  UseCheckOrError:
    active: false
  UseDataClass:
    active: false          # 不强制转换已有的简单类为 data class
  UseIfEmptyOrIfBlank:
    active: true
  UseIsNullOrEmpty:
    active: true
  UseLet:
    active: false
  UseOrEmpty:
    active: true
  UseRequire:
    active: false
  UseRequireNotNull:
    active: true
  UseSumOfInsteadOfFlatMapSize:
    active: false
  VarCouldBeVal:
    active: true
  WildcardImport:
    active: false          # 项目使用 wildcard import（如 compose.foundation.layout.*）
