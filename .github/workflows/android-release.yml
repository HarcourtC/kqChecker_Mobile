name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.1.0'

      # 1. 直接解码，不判断是否存在 (如果没配置 Secret，这里会报错，也算是一种检查)
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release-keystore.jks

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('/*.gradle*', '/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Decode private config
        run: |
          mkdir -p app/src/main/assets
          echo "${{ secrets.CONFIG_PRIVATE_JSON_BASE64 }}" | base64 --decode > app/src/main/assets/config.private.json

      - name: Build Release APK
        # 2. 将密码映射为环境变量，通过命令行参数注入
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release-keystore.jks \
            -Pandroid.injected.signing.store.password=$SIGNING_STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$SIGNING_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$SIGNING_KEY_PASSWORD \
            --parallel

      - name: Find APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          ls -lh "$APK"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.ref_name }}
          path: ${{ steps.apk.outputs.path }}

      - name: Generate Changelog
        id: changelog
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)"

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
            HEADER="## Changes (${PREV_TAG} -> ${CURRENT_TAG})"
          else
            RANGE="${CURRENT_TAG}"
            HEADER="## Changes (${CURRENT_TAG})"
          fi

          COMMITS="$(git log --no-merges --pretty=format:'%s' $RANGE)"

          FEAT="$(printf '%s\n' "$COMMITS" | grep -E '^feat(\(.+\))?: ' || true)"
          FIX="$(printf '%s\n' "$COMMITS" | grep -E '^fix(\(.+\))?: ' || true)"
          PERF="$(printf '%s\n' "$COMMITS" | grep -E '^perf(\(.+\))?: ' || true)"
          REFACTOR="$(printf '%s\n' "$COMMITS" | grep -E '^refactor(\(.+\))?: ' || true)"
          DOCS="$(printf '%s\n' "$COMMITS" | grep -E '^docs(\(.+\))?: ' || true)"
          OTHER="$(printf '%s\n' "$COMMITS" | grep -E -v '^(feat|fix|perf|refactor|docs)(\(.+\))?: ' || true)"

          format_list() {
            if [ -n "$1" ]; then
              printf '%s\n' "$1" | sed 's/^/- /'
            fi
          }

          {
            echo "body<<EOF"
            echo "$HEADER"
            echo
            if [ -n "$FEAT" ]; then
              echo "### Features"
              format_list "$FEAT"
              echo
            fi
            if [ -n "$FIX" ]; then
              echo "### Fixes"
              format_list "$FIX"
              echo
            fi
            if [ -n "$PERF" ]; then
              echo "### Performance"
              format_list "$PERF"
              echo
            fi
            if [ -n "$REFACTOR" ]; then
              echo "### Refactors"
              format_list "$REFACTOR"
              echo
            fi
            if [ -n "$DOCS" ]; then
              echo "### Docs"
              format_list "$DOCS"
              echo
            fi
            if [ -n "$OTHER" ]; then
              echo "### Others"
              format_list "$OTHER"
              echo
            fi
            if [ -z "$COMMITS" ]; then
              echo "- No non-merge commits found in this release range."
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.apk.outputs.path }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: ${{ steps.changelog.outputs.body }}

      - name: Cleanup keystore
        if: always() # 无论成功失败都清理
        run: rm -f release-keystore.jks
      - name: Cleanup private config
        if: always()
        run: rm -f app/src/main/assets/config.private.json
